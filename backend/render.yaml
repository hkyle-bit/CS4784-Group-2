services:
  - type: web
    name: debate-coach-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: debate-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false

databases:
  - name: debate-db
    databaseName: debate_db
    user: debate_user
    plan: free
