# Python environment
python-3.11

# Render configuration
services:
  - type: web
    name: debate-coach-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: FLASK_ENV
        value: production

databases:
  - name: debate-db
    databaseName: debate_db
    user: debate_user
    plan: free
